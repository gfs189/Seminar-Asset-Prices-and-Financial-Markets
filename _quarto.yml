project:
  type: default

format:
  pdf:
    documentclass: memoir
    classoption: [11pt, a4paper]
    include-in-header:
      text: |
        \usepackage[english, samf]{ku-frontpage}
        \assignment{Master's Seminar Paper}
        \advisor{Advisor: Name Here}
        \frontpageimage{figures/your-image.png}
    number-sections: true
    colorlinks: true
    geometry:
      - top=20mm
      - left=20mm
      - bottom=20mm
      - right=20mm
    bibliography: references.bib
    cite-method: natbib
    biblio-style: apalike
    lang: en
    fontsize: 12pt
    highlight-style: github-light

execute:
  echo: false
  warning: false

jupyter: python3